name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # GitHub Pages is static hosting — strip routes that require a server.
      # The JSON file is optional runtime state for the newsletter API that
      # disappears together with the API route in this mode.
      - name: Remove server-only routes
        run: |
          rm -rf app/api
          rm -rf app/feed.xml
          rm -f content/newsletter-subscribers.json

      - name: Build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://aandrew-kl.github.io/city-talks
          NEXT_PUBLIC_BASE_PATH: /city-talks
        run: npm run build

      - name: Add .nojekyll + SPA 404
        run: |
          touch out/.nojekyll
          cp out/404.html out/404.html 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
